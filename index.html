<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech Recognition System | 语音识别系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0e27;
            color: #00ff88;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: linear-gradient(135deg, #0f1430 0%, #1a1f3a 100%);
            border: 2px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            padding: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
        }
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #00ff88;
        }
        .header p {
            color: #00ccff;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #00ff88;
        }
        input[type="file"], select {
            width: 100%;
            padding: 10px;
            border: 2px solid #00ff88;
            background: rgba(0, 255, 136, 0.05);
            color: #00ff88;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        input[type="file"]::file-selector-button {
            background: #00ff88;
            color: #0a0e27;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        button {
            padding: 12px 30px;
            font-size: 14px;
            border: 2px solid #00ff88;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
        }
        .btn-upload {
            background: #00ff88;
            color: #0a0e27;
        }
        .btn-upload:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-reset {
            background: transparent;
            color: #00ff88;
        }
        .loading {
            display: none;
            text-align: center;
            margin: 30px 0;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 15px;
            border: 3px solid rgba(0, 255, 136, 0.2);
            border-top: 3px solid #00ff88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: rgba(255, 68, 68, 0.1);
            color: #ff6666;
            padding: 15px;
            border: 2px solid #ff4444;
            margin-bottom: 15px;
            display: none;
            font-weight: bold;
        }
        .error.show {
            display: block;
        }
        .result-section {
            margin-top: 30px;
            display: none;
        }
        .result-section.show {
            display: block;
        }
        .result-header {
            border-bottom: 2px solid #00ff88;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .result-header h2 {
            color: #00ff88;
            font-size: 1.3em;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: rgba(0, 255, 136, 0.05);
            padding: 20px;
            border: 1px solid #00ff88;
        }
        .stat-label {
            font-size: 0.8em;
            color: #00ccff;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 1.5em;
            color: #00ff88;
            font-weight: bold;
        }
        .result-card {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid #00ff88;
            padding: 20px;
            margin-bottom: 15px;
        }
        .result-card h3 {
            color: #00ff88;
            margin-bottom: 15px;
        }
        .result-text {
            color: #00ccff;
            line-height: 1.8;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-left: 3px solid #00ff88;
            white-space: pre-wrap;
        }
        @media (max-width: 600px) {
            .stats { grid-template-columns: 1fr; }
            .button-group { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 语音识别系统</h1>
            <p>自动语言识别 | 多语言翻译</p>
        </div>

        <div class="error" id="error-message"></div>

        <form id="transcribe-form">
            <div class="form-group">
                <label for="audio-file">📁 音频文件输入</label>
                <input type="file" id="audio-file" accept="audio/*">
                <div id="file-name" style="margin-top: 8px; color: #00ccff; font-size: 0.9em;"></div>
            </div>

            <div class="form-group">
                <label for="target-lang">🌐 目标语言 (可选)</label>
                <select id="target-lang">
                    <option value="">-- 不翻译 --</option>
                    <option value="en">English (英文)</option>
                    <option value="zh">中文 (Chinese)</option>
                    <option value="ja">日本語 (Japanese)</option>
                    <option value="ko">한국어 (Korean)</option>
                </select>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-upload" id="submit-btn">▶ 开始转录</button>
                <button type="reset" class="btn-reset">⟲ 重置</button>
            </div>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>处理音频中...</p>
        </div>

        <div class="result-section" id="result-section">
            <div class="result-header">
                <h2>📊 识别结果</h2>
            </div>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">检测到的语言</div>
                    <div class="stat-value" id="detected-lang">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">状态</div>
                    <div class="stat-value">✓ 完成</div>
                </div>
            </div>
            <div class="result-card">
                <h3>转录结果</h3>
                <div class="result-text" id="transcribed-text"></div>
            </div>
            <div class="result-card" id="translation-card" style="display: none;">
                <h3>翻译结果</h3>
                <div class="result-text" id="translated-text"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';

        const form = document.getElementById('transcribe-form');
        const audioFile = document.getElementById('audio-file');
        const fileName = document.getElementById('file-name');
        const targetLang = document.getElementById('target-lang');
        const submitBtn = document.getElementById('submit-btn');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('result-section');
        const errorMessage = document.getElementById('error-message');
        const detectedLang = document.getElementById('detected-lang');
        const transcribedText = document.getElementById('transcribed-text');
        const translationCard = document.getElementById('translation-card');
        const translatedText = document.getElementById('translated-text');

        audioFile.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                fileName.textContent = '已选择: ' + e.target.files[0].name;
            } else {
                fileName.textContent = '';
            }
        });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!audioFile.files || audioFile.files.length === 0) {
                showError('请选择一个音频文件');
                return;
            }

            const formData = new FormData();
            formData.append('audio', audioFile.files[0]);
            
            if (targetLang.value) {
                formData.append('target_language', targetLang.value);
            }

            submitBtn.disabled = true;
            loading.classList.add('show');
            resultSection.classList.remove('show');
            errorMessage.classList.remove('show');

            try {
                const response = await fetch(`${API_BASE}/transcribe`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || '请求失败');
                }

                detectedLang.textContent = data.language_name || data.detected_language;
                transcribedText.textContent = data.transcribed_text || '';

                if (data.translated_text) {
                    translationCard.style.display = 'block';
                    translatedText.textContent = data.translated_text;
                } else {
                    translationCard.style.display = 'none';
                }

                resultSection.classList.add('show');
            } catch (error) {
                showError(error.message);
            } finally {
                submitBtn.disabled = false;
                loading.classList.remove('show');
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        form.addEventListener('reset', function() {
            fileName.textContent = '';
            resultSection.classList.remove('show');
            errorMessage.classList.remove('show');
            translationCard.style.display = 'none';
        });
    </script>
</body>
</html>
